<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digielevat | Technical Engineering Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --text-main: #ffffff;
            --text-dim: #737373;
            --accent: #ff4d00; /* Engineering Orange */
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; /* Technical Grid */
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* Authoritative Clean Header */
        header {
            padding: 140px 40px 80px;
            max-width: 1200px;
            margin: auto;
            border-bottom: 1px solid var(--border);
        }

        .agency-tag {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            display: block;
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            line-height: 0.85;
            margin: 0;
            letter-spacing: -4px;
            text-transform: uppercase;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 40px;
        }

        .header-meta p {
            max-width: 500px;
            font-size: 1.25rem;
            color: var(--text-dim);
            margin: 0;
        }

        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Project Grid */
        .container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 40px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px; /* Technical divider look */
            background-color: var(--border);
            border: 1px solid var(--border);
        }

        .project-card {
            background-color: var(--bg);
            text-decoration: none;
            color: inherit;
            padding: 40px;
            transition: background 0.4s;
        }

        .project-card:hover {
            background-color: var(--surface);
        }

        /* Precision Mockup */
        .browser-frame {
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .frame-top {
            height: 30px;
            background: #262626;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 6px;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: #404040; }

        .img-container {
            height: 320px;
            overflow: hidden;
        }

        .img-container img {
            width: 100%; height: 100%; object-fit: cover; object-position: top;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-card:hover img {
            transform: scale(1.05);
        }

        .info {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .info h3 {
            font-size: 24px; font-weight: 700; margin: 0;
            text-transform: uppercase;
        }

        .tech-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            padding: 4px 8px;
            border: 1px solid var(--border);
        }

        @media (max-width: 900px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            .header-meta { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <span class="agency-tag">Digielevat Digital Systems</span>
        <h1>Project<br>Deployment</h1>
        <div class="header-meta">
            <p>Authoritative web engineering for aviation, retail, and corporate sectors. Precision-built digital infrastructure.</p>
            <div style="font-family: 'JetBrains Mono'; font-size: 12px;">
                <span class="status-dot"></span>SYSTEMS ACTIVE / 2026
            </div>
        </div>
    </header>

    <div class="container">
        <div class="portfolio-grid">
            
            <a href="https://digifalcon.in" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(634).png?raw=true" alt="Digifalcon">
                    </div>
                </div>
                <div class="info">
                    <h3>Digifalcon</h3>
                    <span class="tech-label">AV-01</span>
                </div>
            </a>

            <a href="https://skylighthouse.co.in" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(638).png?raw=true" alt="Sky Light House">
                    </div>
                </div>
                <div class="info">
                    <h3>Sky Light House</h3>
                    <span class="tech-label">RT-02</span>
                </div>
            </a>

            <a href="https://medpathglobal.in" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(640).png?raw=true" alt="Medpath">
                    </div>
                </div>
                <div class="info">
                    <h3>Medpath Global</h3>
                    <span class="tech-label">MD-03</span>
                </div>
            </a>

            <a href="https://digielevat.com" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(639).png?raw=true" alt="Digielevat">
                    </div>
                </div>
                <div class="info">
                    <h3>Digielevat</h3>
                    <span class="tech-label">HQ-04</span>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
