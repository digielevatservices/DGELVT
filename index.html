<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digielevat | Digital Artifacts</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #00f2ff;
            --secondary: #7000ff;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background Canvas */
        .canvas-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* High-Impact Creative Header */
        .hero {
            height: 80vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            perspective: 1000px;
        }

        .hero h1 {
            font-size: clamp(3rem, 12vw, 8rem);
            line-height: 0.9; margin: 0;
            font-weight: 700; text-transform: uppercase;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 30px rgba(0,242,255,0.2));
            transform: rotateX(10deg);
        }

        .hero p {
            font-size: 1.2rem; letter-spacing: 5px;
            text-transform: uppercase; color: var(--accent);
            margin-top: 20px; opacity: 0.8;
        }

        .scroll-indicator {
            margin-top: 50px; font-size: 12px; opacity: 0.4;
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        .container { max-width: 1300px; margin: auto; padding: 0 40px 100px; }

        .portfolio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }

        .project-card { text-decoration: none; color: inherit; display: block; position: relative; }

        /* The "Glass Frame" Mockup */
        .mockup-frame {
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            padding: 12px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 40px 100px -30px rgba(0,0,0,0.7);
        }

        .mockup-frame::after {
            content: ""; position: absolute; inset: 0; border-radius: 24px;
            background: linear-gradient(45deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            opacity: 0; transition: 0.6s;
        }

        .img-wrapper {
            width: 100%; height: 400px; border-radius: 14px; overflow: hidden;
            background: #000;
        }

        .img-wrapper img {
            width: 100%; height: 100%; object-fit: cover; object-position: top;
            filter: grayscale(20%); transition: 1s ease;
        }

        .project-card:hover .mockup-frame {
            transform: translateY(-20px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 60px 120px -20px rgba(0, 242, 255, 0.15);
        }

        .project-card:hover .mockup-frame::after { opacity: 1; }
        .project-card:hover img { filter: grayscale(0%); transform: scale(1.05); }

        .info { margin-top: 30px; }
        .info h3 { font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -1px; }
        .info p { color: #888; font-size: 16px; margin-top: 10px; border-left: 2px solid var(--accent); padding-left: 15px; }

        @media (max-width: 900px) { .portfolio-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 4rem; } }
    </style>
</head>
<body>
    <div class="canvas-bg"></div>

    <section class="hero">
        <p>Digielevat Studios</p>
        <h1>Selected<br>Artifacts</h1>
        <div class="scroll-indicator">EXPLORE PROJECTS ↓</div>
    </section>

    <div class="container">
        <div class="portfolio-grid">
            
            <a href="https://digifalcon.in" class="project-card">
                <div class="mockup-frame">
                    <div class="img-wrapper">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(634).png?raw=true" alt="Digifalcon">
                    </div>
                </div>
                <div class="info">
                    <h3>Digifalcon</h3>
                    <p>Aviation Intel & SEO dominance portal.</p>
                </div>
            </a>

            <a href="https://skylighthouse.co.in" class="project-card">
                <div class="mockup-frame">
                    <div class="img-wrapper">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(638).png?raw=true" alt="Sky Light House">
                    </div>
                </div>
                <div class="info">
                    <h3>Sky Light House</h3>
                    <p>Visual storytelling for luxury lighting retail.</p>
                </div>
            </a>

            <a href="https://medpathglobal.in" class="project-card">
                <div class="mockup-frame">
                    <div class="img-wrapper">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(640).png?raw=true" alt="Medpath">
                    </div>
                </div>
                <div class="info">
                    <h3>Medpath Global</h3>
                    <p>Corporate trust & global logistics interface.</p>
                </div>
            </a>

            <a href="https://digielevat.com" class="project-card">
                <div class="mockup-frame">
                    <div class="img-wrapper">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(639).png?raw=true" alt="Digielevat">
                    </div>
                </div>
                <div class="info">
                    <h3>Digielevat</h3>
                    <p>The core of our digital strategy & brand.</p>
                </div>
            </a>

        </div>
    </div>
</body>
</html>
