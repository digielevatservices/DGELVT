<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digielevat | Technical Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #ff4d00; /* Engineering Orange */
            --text-dim: #666666;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        header {
            padding: 120px 40px 60px;
            max-width: 1200px;
            margin: auto;
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            line-height: 0.85;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -4px;
        }

        /* The Showcase Section */
        .container {
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 40px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .project-card {
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }

        /* Precision Frame with Hover Glow */
        .browser-frame {
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
        }

        .frame-top {
            height: 34px;
            background: #181818;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; margin-right: 6px; }

        .img-container {
            height: 350px;
            overflow: hidden;
            background: #000;
            opacity: 0.7; /* Dim by default */
            transition: opacity 0.5s ease;
        }

        .img-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top;
            filter: grayscale(30%);
            transition: all 0.8s ease;
        }

        /* Hover Interactions */
        .project-card:hover .browser-frame {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -15px rgba(255, 77, 0, 0.2);
        }

        .project-card:hover .img-container {
            opacity: 1; /* Powers on */
        }

        .project-card:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .info {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h3 {
            font-size: 20px;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .tech-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 2px 8px;
        }

        .project-card:hover .tech-id {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 900px) {
            .portfolio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <p style="font-family: 'JetBrains Mono'; color: var(--accent); letter-spacing: 4px; font-size: 12px;">SYSTEMS.DEPLOYMENT.LOG</p>
        <h1>Project<br>Deployment</h1>
        <p style="color: var(--text-dim); max-width: 500px; margin-top: 20px;">Verification of digital infrastructure across aviation, logistics, and retail assets.</p>
    </header>

    <div class="container">
        <div class="portfolio-grid">
            
            <a href="https://digifalcon.in" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(634).png?raw=true" alt="Digifalcon">
                    </div>
                </div>
                <div class="info">
                    <h3>Digifalcon</h3>
                    <span class="tech-id">AV-LOG-01</span>
                </div>
            </a>

            <a href="https://skylighthouse.co.in" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(638).png?raw=true" alt="Sky Light House">
                    </div>
                </div>
                <div class="info">
                    <h3>Sky Light House</h3>
                    <span class="tech-id">RT-LOG-02</span>
                </div>
            </a>

            <a href="https://medpathglobal.in" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(640).png?raw=true" alt="Medpath">
                    </div>
                </div>
                <div class="info">
                    <h3>Medpath Global</h3>
                    <span class="tech-id">MD-LOG-03</span>
                </div>
            </a>

            <a href="https://digielevat.com" class="project-card">
                <div class="browser-frame">
                    <div class="frame-top"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="img-container">
                        <img src="https://github.com/digielevatservices/DGELVT/blob/main/Screenshot%20(639).png?raw=true" alt="Digielevat">
                    </div>
                </div>
                <div class="info">
                    <h3>Digielevat</h3>
                    <span class="tech-id">HQ-LOG-04</span>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
